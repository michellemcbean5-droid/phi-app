name: Build Android APK

on:
  push:
    branches: [claude/app-review-deployment-bkpb38, main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --non-interactive
        env:
          EXPO_NO_DOTENV: 1

      - name: Build debug APK
        working-directory: mobile/android
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt of 3"
            if ./gradlew assembleDebug --no-daemon; then
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000 -Dorg.gradle.internal.repository.max.retries=5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phi-app-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
