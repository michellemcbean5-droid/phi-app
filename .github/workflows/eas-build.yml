name: Build Android APK

on:
  push:
    branches: [claude/app-review-deployment-bkpb38, main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Patch metro exports (expo-cli needs deep import metro's exports map blocks)
        working-directory: mobile
        run: |
          node -e "
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('node_modules/metro/package.json'));
          p.exports['./src/*'] = './src/*.js';
          fs.writeFileSync('node_modules/metro/package.json', JSON.stringify(p, null, 2));
          "

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --non-interactive
        env:
          EXPO_NO_DOTENV: 1

      - name: Disable unused Fresco GIF/WebP decoders (app has no GIF/WebP assets)
        working-directory: mobile/android
        run: |
          sed -i 's/expo.gif.enabled=true/expo.gif.enabled=false/' gradle.properties
          sed -i 's/expo.webp.enabled=true/expo.webp.enabled=false/' gradle.properties

      - name: Neutralize dead oss.sonatype.org snapshots repo
        working-directory: mobile/android
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/block-dead-sonatype.gradle << 'EOF'
          allprojects {
            repositories.all { repo ->
              if (repo instanceof org.gradle.api.artifacts.repositories.MavenArtifactRepository && repo.url.toString().contains('oss.sonatype.org')) {
                repo.content { it.excludeGroupByRegex(".*") }
              }
            }
          }
          EOF

      - name: Build release APK (bundles JS, no Metro/computer needed)
        working-directory: mobile/android
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt of 3"
            if ./gradlew assembleRelease --no-daemon; then
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.internal.http.connectionTimeout=60000 -Dorg.gradle.internal.http.socketTimeout=60000 -Dorg.gradle.internal.repository.max.retries=5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phi-app-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
