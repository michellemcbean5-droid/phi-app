name: Build Android APK

on:
  push:
    branches: [claude/app-review-deployment-bkpb38, main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --non-interactive
        env:
          EXPO_NO_DOTENV: 1

      - name: Override Kotlin version for KSP compatibility
        working-directory: mobile/android
        run: echo "android.kotlinVersion=2.1.21" >> gradle.properties

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phi-app-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
