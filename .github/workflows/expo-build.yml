name: Expo Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mobile-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package.json
      - run: npm install
      - run: npx tsc --noEmit
      - name: EAS Android preview build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx eas build --platform android --profile preview --non-interactive
