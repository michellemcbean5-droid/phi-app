name: Expo Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows manual APK build from the Actions tab on GitHub
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Optional note for this build'
        required: false
        default: 'Manual APK build'

permissions:
  contents: read

jobs:
  # ── Step 1: Always run TypeScript check on every push and PR ──────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package.json
      - run: npm install
      - run: npx tsc --noEmit

  # ── Step 2: Build Android APK on EAS — only on push to main or manual run ─
  eas-build:
    name: EAS Android APK Build
    runs-on: ubuntu-latest
    needs: typecheck
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package.json

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK on EAS servers
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Prevents EAS from failing because the CI workspace has untracked files
          EXPO_NO_GIT_STATUS: '1'
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
