name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mobile/package.json
      - run: npm install
      - run: npx vitest run
